General {
        name = "tls-leaf.test.net";
        vhost = "0.0.0.0";
        description = "TLS Test Leaf";
        numeric = 11;
        tls certfile = "certs/leaf.pem";
        tls keyfile = "certs/leaf.key";
};

Admin {
        Location = "Test Network";
        Location = "TLS Leaf";
        Contact = "test@test.net";
};

Class {
        name = "Server";
        pingfreq = 90 seconds;
        connectfreq = 5 minutes;
        sendq = 9 megabytes;
        maxlinks = 10;
};

Class {
        name = "Local";
        pingfreq = 1 minutes 30 seconds;
        sendq = 160000;
        maxlinks = 100;
};

Client { ip = "*"; class = "Local"; };

Operator {
        local = no;
        class = "Local";
        host = "*@*";
        password = "$PLAIN$operpass";
        name = "testoper";
};

Connect {
        name = "tls-hub.test.net";
        host = "10.55.0.20";
        port = 4441;
        password = "testpass";
        class = "Server";
        hub;
        autoconnect = no;
        tls = yes;
        tls cacertfile = "certs/ca.pem";
        tls systemca = no;
        tls verifypeer = yes;
};

Port { port = 6678; };

Port {
        port = 6680;
        tls = yes;
        tls systemca = no;
};

Port {
        server = yes;
        port = 4401;
        tls = yes;
        tls systemca = no;
};

Port {
        server = yes;
        port = 4402;
        tls = yes;
        tls cacertfile = "certs/ca.pem";
        tls systemca = no;
        tls verifypeer = yes;
};

Features {
        "NODNS" = "TRUE";
        "CONFIG_OPERCMDS" = "TRUE";
        "TLS_SYSTEMCA" = "FALSE";
        "PPATH" = "ircd-tls-leaf.pid";
};

General {
        name = "tls-hub.test.net";
        vhost = "0.0.0.0";
        description = "TLS Test Hub";
        numeric = 10;
        tls certfile = "certs/hub.pem";
        tls keyfile = "certs/hub.key";
};

Admin {
        Location = "Test Network";
        Location = "TLS Hub";
        Contact = "test@test.net";
};

Class {
        name = "Server";
        pingfreq = 90 seconds;
        connectfreq = 5 minutes;
        sendq = 9 megabytes;
        maxlinks = 10;
};

Class {
        name = "Local";
        pingfreq = 1 minutes 30 seconds;
        sendq = 160000;
        maxlinks = 100;
};

Client { ip = "*"; class = "Local"; };

Operator {
        local = no;
        class = "Local";
        host = "*@*";
        password = "$PLAIN$operpass";
        name = "testoper";
};

Connect {
        name = "tlspeer.test.net";
        host = "10.55.0.1";
        password = "testpass";
        class = "Server";
        tls = yes;
        tls fingerprint = "e4cae03383ed95a3754f42bb4acc2f2e887ef266d261ecc8ab4d0704814330d5";
};

Connect {
        name = "tlspeer-ca.test.net";
        host = "10.55.0.1";
        password = "testpass";
        class = "Server";
        tls = yes;
        tls cacertfile = "certs/ca.pem";
        tls systemca = no;
        tls verifypeer = yes;
};

Connect {
        name = "tlspeer-bad.test.net";
        host = "10.55.0.1";
        password = "testpass";
        class = "Server";
        tls = yes;

General {
        name = "hub.test.net";
        vhost = "0.0.0.0";
        description = "Test Hub";
        numeric = 1;
};

Admin {
        Location = "Test Network";
        Location = "Hub Server";
        Contact = "test@test.net";
};

Class {
        name = "Server";
        pingfreq = 90 seconds;
        connectfreq = 5 minutes;
        sendq = 9 megabytes;
        maxlinks = 10;
};

Connect {
        name = "leaf1.test.net";
        host = "10.55.0.11";
        port = 4401;
        password = "testpass";
        class = "Server";
        hub;
        autoconnect = no;
};

Connect {
        name = "leaf2.test.net";
        host = "10.55.0.12";
        port = 4402;
        password = "testpass";
        class = "Server";
        hub;
        autoconnect = no;
};

Connect {
        name = "services.test.net";
        host = "10.55.0.1";
        password = "testpass";
        class = "Server";
        hub;
};

Connect {
        name = "notulined.test.net";
        host = "10.55.0.1";
        password = "testpass";
        class = "Server";
};

Connect {
        name = "uworldonly.test.net";
        host = "10.55.0.1";
        password = "testpass";
        class = "Server";
};

UWorld {
        oper = "services.test.net";
};

UWorld {
        name = "uworldonly.test.net";
};

Class {
        name = "Local";
        pingfreq = 1 minutes 30 seconds;
        sendq = 160000;
        # Allow a full IRCv3 tagged line (TAGSLEN+BUFSIZE) without Excess Flood.
        maxflood = 16384;
        maxlinks = 100;
};

# maxflood above the CLIENT_FLOOD default (1024) => flood-exempt from throttling.
Class {
        name = "Exempt";
        pingfreq = 1 minutes 30 seconds;
        sendq = 160000;
        maxflood = 262144;
        maxlinks = 100;
};

Client { ip = "*"; class = "Local"; username = "ident"; maxlinks = 50; };
Client { ip = "*"; class = "Local"; maxlinks = 50; };
# Connections on the exempt WebSocket port (7002) are flood-exempt. Defined
# last so it is matched first (Client blocks are checked in reverse order).
Client { ip = "*"; port = 7002; class = "Exempt"; maxlinks = 50; };

IAuth { program = "/opt/ircu/bin/iauth-tilded.pl"; };

Operator {
        local = no;
        class = "Local";
        host = "*@*";
        password = "$PLAIN$operpass";
        name = "testoper";
        set = yes;
        wide_gline = yes;
};

Port { server = yes; port = 4400; };
Port { port = 6667; };
Port { websocket = yes; port = 7000; };
Port { websocket = yes; cloudflare = yes; port = 7001; };
# Exempt WebSocket port: connections here land in the Exempt class.
Port { websocket = yes; port = 7002; };

Features {
        "HUB" = "TRUE";
        "NODNS" = "TRUE";
        "CONFIG_OPERCMDS" = "TRUE";
        "CHANNELLEN" = "50";
        "MAXCHANNELSPERUSER" = "20";
        "CAP_MESSAGE_TAGS" = "TRUE";
        "CAP_SERVER_TIME" = "TRUE";
        "CAP_ACCOUNT_TAG" = "TRUE";
        "CLIENTTAGDENY" = "*,-example.com/foo";
# Long suites open many clients from one host; keep clone checks permissive.
        "IPCHECK_CLONE_LIMIT" = "1000";
        "HOST_HIDING" = "TRUE";
        "TRUST_USERNAME" = "TRUE";
        "IPCHECK_CLONE_LIMIT" = "100";
        "IPCHECK_CLONE_PERIOD" = "1";
# check_pings() wakes at min(PINGFREQUENCY, …); keep this low so WS keepalive
# tests are not blocked for 120s when the hub has no other local clients.
        "PINGFREQUENCY" = "3";
# RFC6455 server Ping interval for WebSocket ports (see readme.features)
        "WEBSOCKET_KEEPALIVE" = "2";
};

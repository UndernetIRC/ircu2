General {
        name = "b.test.net";
        vhost = "0.0.0.0";
        description = "Compat hub (B) NETWORK_FEATURES=FALSE";
        numeric = 1;
        tls certfile = "certs/hub.pem";
        tls keyfile = "certs/hub.key";
};

Admin {
        Location = "NF Compat Test";
        Location = "Hub Server B";
        Contact = "test@test.net";
};

Class {
        name = "Server";
        pingfreq = 90 seconds;
        connectfreq = 5 minutes;
        sendq = 9 megabytes;
        maxlinks = 10;
};

Connect {
        name = "a.prod.test.net";
        host = "10.55.0.40";
        port = 4420;
        password = "testpass";
        class = "Server";
        hub;
        autoconnect = no;
};

Connect {
        name = "c.test.net";
        host = "10.55.0.42";
        port = 4422;
        password = "testpass";
        class = "Server";
        hub;
        autoconnect = no;
};

Connect {
        name = "spy.test.net";
        host = "10.55.0.1";
        password = "testpass";
        class = "Server";
};

UWorld {
        oper = "services.test.net";
};

Class {
        name = "Local";
        pingfreq = 1 minutes 30 seconds;
        sendq = 160000;
        maxlinks = 100;
};

Client { ip = "*"; class = "Local"; };

Operator {
        local = no;
        class = "Local";
        host = "*@*";
        password = "$PLAIN$operpass";
        name = "testoper";
};

Port { server = yes; port = 4421; };
Port { port = 6672; };
Port {
        port = 7692;
        tls = yes;
        tls systemca = no;
};

Features {
        "HUB" = "TRUE";
        "NODNS" = "TRUE";
        "CONFIG_OPERCMDS" = "TRUE";
        # Drop remote OPMODE +x and already-authed ACCOUNT updates toward A.
        "NETWORK_FEATURES" = "FALSE";
        "PPATH" = "ircd-nf-b.pid";
};

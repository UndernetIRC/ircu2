General {
        name = "leaf1.test.net";
        vhost = "0.0.0.0";
        description = "Test Leaf 1";
        numeric = 2;
};

Admin {
        Location = "Test Network";
        Location = "Leaf 1 Server";
        Contact = "test@test.net";
};

Class {
        name = "Server";
        pingfreq = 90 seconds;
        connectfreq = 5 minutes;
        sendq = 9 megabytes;
        maxlinks = 10;
};

Connect {
        name = "hub.test.net";
        host = "10.55.0.10";
        port = 4400;
        password = "testpass";
        class = "Server";
        hub;
        autoconnect = yes;
};

Class {
        name = "Local";
        pingfreq = 1 minutes 30 seconds;
        sendq = 160000;
        maxlinks = 100;
};

Client { ip = "*"; class = "Local"; };

Operator {
        local = no;
        class = "Local";
        host = "*@*";
        password = "$PLAIN$operpass";
        name = "testoper";
};

Port { server = yes; port = 4401; };
Port { port = 6668; };

Features {
        "NODNS" = "TRUE";
        "CONFIG_OPERCMDS" = "TRUE";
        "PPATH" = "ircd-leaf1.pid";
};

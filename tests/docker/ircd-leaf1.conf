General {
        name = "leaf1.test.net";
        vhost = "0.0.0.0";
        description = "Test Leaf 1";
        numeric = 2;
};

Admin {
        Location = "Test Network";
        Location = "Leaf 1 Server";
        Contact = "test@test.net";
};

Class {
        name = "Server";
        pingfreq = 90 seconds;
        connectfreq = 5 minutes;
        sendq = 9 megabytes;
        maxlinks = 10;
};

Connect {
        name = "hub.test.net";
        host = "10.55.0.10";
        port = 4400;
        password = "testpass";
        class = "Server";
        hub;
        autoconnect = yes;
};

UWorld {
        oper = "services.test.net";
};

Class {
        name = "Local";
        pingfreq = 1 minutes 30 seconds;
        sendq = 160000;
        maxflood = 16384;
        maxlinks = 100;
};

# Class with maxflood above the CLIENT_FLOOD default (1024): its clients are
# exempt from input throttling. Used by tests/pr69_exempt_throttle/.
Class {
        name = "Exempt";
        pingfreq = 1 minutes 30 seconds;
        sendq = 160000;
        maxflood = 262144;
        maxlinks = 100;
};

Client { ip = "*"; class = "Local"; };
# Route clients that connect on the dedicated exempt port (6690) into theExempt class.
Client { ip = "*"; port = 6690; class = "Exempt"; };

IAuth { program = "/opt/ircu/bin/iauth-tilded.pl"; };

Operator {
        local = no;
        class = "Local";
        host = "*@*";
        password = "$PLAIN$operpass";
        name = "testoper";
        set = yes;
        wide_gline = yes;
};

Port { server = yes; port = 4401; };
Port { port = 6668; };
# Dedicated client port whose connections land in the Exempt class (see above).
Port { port = 6690; };

Features {
        "NODNS" = "TRUE";
        "CONFIG_OPERCMDS" = "TRUE";
        "CAP_MESSAGE_TAGS" = "TRUE";
        "CAP_SERVER_TIME" = "TRUE";
        "CAP_ACCOUNT_TAG" = "TRUE";
        "CLIENTTAGDENY" = "*,-example.com/foo";
        "IPCHECK_CLONE_LIMIT" = "1000";
        "IPCHECK_CLONE_PERIOD" = "1";
        "PPATH" = "ircd-leaf1.pid";
        "IPCHECK_CLONE_LIMIT" = "100";
        "IPCHECK_CLONE_PERIOD" = "1";
};

General {
        name = "leaf2.test.net";
        vhost = "0.0.0.0";
        description = "Test Leaf 2";
        numeric = 3;
};

Admin {
        Location = "Test Network";
        Location = "Leaf 2 Server";
        Contact = "test@test.net";
};

Class {
        name = "Server";
        pingfreq = 90 seconds;
        connectfreq = 5 minutes;
        sendq = 9 megabytes;
        maxlinks = 10;
};

Connect {
        name = "hub.test.net";
        host = "10.55.0.10";
        port = 4400;
        password = "testpass";
        class = "Server";
        hub;
        autoconnect = yes;
};

UWorld {
        oper = "services.test.net";
};

Class {
        name = "Local";
        pingfreq = 1 minutes 30 seconds;
        sendq = 160000;
        maxflood = 16384;
        maxlinks = 100;
};

Client { ip = "*"; class = "Local"; };

Operator {
        local = no;
        class = "Local";
        host = "*@*";
        password = "$PLAIN$operpass";
        name = "testoper";
};

Port { server = yes; port = 4402; };
Port { port = 6669; };

Features {
        "NODNS" = "TRUE";
        "CONFIG_OPERCMDS" = "TRUE";
        "CAP_MESSAGE_TAGS" = "TRUE";
        "CAP_SERVER_TIME" = "TRUE";
        "CAP_ACCOUNT_TAG" = "TRUE";
        "CLIENTTAGDENY" = "*,-example.com/foo";
        "IPCHECK_CLONE_LIMIT" = "1000";
        "IPCHECK_CLONE_PERIOD" = "1";
        "PPATH" = "ircd-leaf2.pid";
};

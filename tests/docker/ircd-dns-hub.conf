General {
        name = "dns-hub.test.net";
        vhost = "0.0.0.0";
        description = "DNS integration test hub";
        numeric = 20;
        dns server = "10.55.0.31";
};

Admin {
        Location = "Test Network";
        Location = "DNS Hub";
        Contact = "test@test.net";
};

Class {
        name = "Local";
        pingfreq = 5 minutes;
        sendq = 160000;
        maxlinks = 100;
};

Class {
        name = "Server";
        pingfreq = 90 seconds;
        connectfreq = 5 minutes;
        sendq = 9 megabytes;
        maxlinks = 10;
};

Client { ip = "*"; class = "Local"; maxlinks = 50; };

Operator {
        local = no;
        class = "Local";
        host = "*@*";
        password = "$PLAIN$operpass";
        name = "testoper";
        set = yes;
};

Port { port = 6670; };

Features {
        "HUB" = "TRUE";
        "NODNS" = "FALSE";
        "DNS_TCP_MAXCONN" = "256";
        "AUTH_TIMEOUT" = "30";
        "PINGFREQUENCY" = "300";
        "CONFIG_OPERCMDS" = "TRUE";
};

Connect {
        name = "aaaa.tc.test";
        host = "aaaa.tc.test";
        port = 9999;
        password = "testpass";
        class = "Server";
        autoconnect = no;
};

# Separate block for the empty-AAAA-over-TCP fallback test: connect_server()
# caches the resolved address in the ConfItem, so tests must not share one.
Connect {
        name = "aaaa.empty.test";
        host = "aaaa.empty.test";
        port = 9999;
        password = "testpass";
        class = "Server";
        autoconnect = no;
};

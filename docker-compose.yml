services:
  ircd-hub:
    build:
      context: .
      args:
        IRCD_CONF: tests/docker/ircd-hub.conf
        TLS_BACKEND: ${TLS_BACKEND:-openssl}
        SANITIZE: ${IRCD_SANITIZE:-}
    container_name: ircu-hub
    environment:
      IRCD_DEBUG: ${IRCD_DEBUG:-}
      ASAN_OPTIONS: ${ASAN_OPTIONS:-abort_on_error=1:halt_on_error=1:detect_leaks=0:log_path=/opt/ircu/debug/asan}
    volumes:
      - ${IRCD_DEBUG_DIR:-./tests/debug-output}:/opt/ircu/debug
    security_opt:
      - seccomp:unconfined
    ulimits:
      core:
        soft: -1
        hard: -1
      nofile:
        soft: 4096
        hard: 4096
    ports:
      - "6667:6667"
      - "4400:4400"
      - "7000:7000"
      - "7001:7001"
      - "7002:7002"
    networks:
      ircu-test-net:
        ipv4_address: 10.55.0.10

  ircd-leaf1:
    build:
      context: .
      args:
        IRCD_CONF: tests/docker/ircd-leaf1.conf
    container_name: ircu-leaf1
    ports:
      - "6668:6668"
      - "4401:4401"
      - "6690:6690"
    networks:
      ircu-test-net:
        ipv4_address: 10.55.0.11
    depends_on:
      - ircd-hub

  ircd-leaf2:
    build:
      context: .
      args:
        IRCD_CONF: tests/docker/ircd-leaf2.conf
    container_name: ircu-leaf2
    ports:
      - "6669:6669"
      - "4402:4402"
    networks:
      ircu-test-net:
        ipv4_address: 10.55.0.12
    depends_on:
      - ircd-hub

  ircd-tls-hub:
    build:
      context: .
      args:
        IRCD_CONF: tests/docker/ircd-tls-hub.conf
        TLS_BACKEND: ${TLS_BACKEND:-openssl}
    container_name: ircu-tls-hub
    ports:
      - "16677:6677"
      - "16697:6697"
      - "16698:6698"
      - "16700:6700"
      - "16701:6701"
      - "14440:4440"
      - "14441:4441"
    networks:
      ircu-test-net:
        ipv4_address: 10.55.0.20

  ircd-tls-leaf:
    build:
      context: .
      args:
        IRCD_CONF: tests/docker/ircd-tls-leaf.conf
        TLS_BACKEND: ${TLS_BACKEND:-openssl}
    container_name: ircu-tls-leaf
    ports:
      - "16678:6678"
      - "16680:6680"
      - "14411:4401"
      - "14412:4402"
    networks:
      ircu-test-net:
        ipv4_address: 10.55.0.21
    depends_on:
      - ircd-tls-hub

  # The config is baked into the image (IRCD_CONF); tests push config
  # changes with docker cp (see tests/class_limits/helpers.py).  Do NOT
  # bind-mount the config: macOS VM file sharing propagates host writes
  # asynchronously, so a REHASH right after a host-side write can read a
  # truncated config and silently close all listeners.
  ircd-limits:
    build:
      context: .
      args:
        IRCD_CONF: tests/class_limits/ircd-limits.conf
    container_name: ircu-limits
    command: ["-f", "/opt/ircu/lib/ircd.conf", "-n", "-x", "8"]
    ports:
      - "6670:6670"
      - "4410:4410"
    networks:
      ircu-test-net:
        ipv4_address: 10.55.0.30

  test-dns:
    build:
      context: .
      dockerfile: tests/dns_server/Dockerfile
    container_name: ircu-test-dns
    environment:
      CLIENT_IPV4: "10.55.0.1"
      AAAA_TARGET: "fdaa:1:1::42"
    ports:
      - "8053:8053"
    networks:
      ircu-test-net:
        ipv4_address: 10.55.0.31

  ircd-dns-hub:
    build:
      context: .
      args:
        IRCD_CONF: tests/docker/ircd-dns-hub.conf
        TLS_BACKEND: ${TLS_BACKEND:-openssl}
        SANITIZE: ${IRCD_SANITIZE:-}
    container_name: ircu-dns-hub
    environment:
      IRCD_DEBUG: ${IRCD_DEBUG:-}
      ASAN_OPTIONS: ${ASAN_OPTIONS:-abort_on_error=1:halt_on_error=1:detect_leaks=0:log_path=/opt/ircu/debug/asan}
    volumes:
      - ${IRCD_DEBUG_DIR:-./tests/debug-output}:/opt/ircu/debug
    security_opt:
      - seccomp:unconfined
    ulimits:
      core:
        soft: -1
        hard: -1
      nofile:
        soft: 4096
        hard: 4096
    ports:
      - "6671:6670"
      - "6672:6672"
    networks:
      ircu-test-net:
        ipv4_address: 10.55.0.15
    depends_on:
      - test-dns

  # NETWORK_FEATURES compat topology: A (prod release) — B (new, NF=FALSE) — C (new, NF=TRUE)
  # Services attach to C; B must not relay remote OPMODE +x / already-authed ACCOUNT to A.
  ircd-nf-a:
    build:
      context: .
      target: runtime-release
      args:
        IRCD_CONF: tests/docker/ircd-nf-a.conf
        IRCD_RELEASE_TAG: ${IRCD_RELEASE_TAG:-u2.10.12.19}
    container_name: ircu-nf-a
    ports:
      - "6671:6671"
      - "4420:4420"
    networks:
      ircu-test-net:
        ipv4_address: 10.55.0.40
    depends_on:
      - ircd-nf-b

  ircd-nf-b:
    build:
      context: .
      target: runtime-tree
      args:
        IRCD_CONF: tests/docker/ircd-nf-b.conf
        TLS_BACKEND: ${TLS_BACKEND:-openssl}
        SANITIZE: ${IRCD_SANITIZE:-}
    container_name: ircu-nf-b
    ports:
      - "6672:6672"
      - "7692:7692"
      - "4421:4421"
    networks:
      ircu-test-net:
        ipv4_address: 10.55.0.41

  ircd-nf-c:
    build:
      context: .
      target: runtime-tree
      args:
        IRCD_CONF: tests/docker/ircd-nf-c.conf
        TLS_BACKEND: ${TLS_BACKEND:-openssl}
        SANITIZE: ${IRCD_SANITIZE:-}
    container_name: ircu-nf-c
    ports:
      - "6673:6673"
      - "4422:4422"
    networks:
      ircu-test-net:
        ipv4_address: 10.55.0.42
    depends_on:
      - ircd-nf-b

networks:
  ircu-test-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.55.0.0/24

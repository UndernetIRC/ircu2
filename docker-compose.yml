services:
  ircd-hub:
    build:
      context: .
      args:
        IRCD_CONF: tests/docker/ircd-hub.conf
        TLS_BACKEND: ${TLS_BACKEND:-openssl}
        SANITIZE: ${IRCD_SANITIZE:-}
    container_name: ircu-hub
    environment:
      IRCD_DEBUG: ${IRCD_DEBUG:-}
      ASAN_OPTIONS: ${ASAN_OPTIONS:-abort_on_error=1:halt_on_error=1:detect_leaks=0:log_path=/opt/ircu/debug/asan}
    volumes:
      - ${IRCD_DEBUG_DIR:-./tests/debug-output}:/opt/ircu/debug
    security_opt:
      - seccomp:unconfined
    ulimits:
      core:
        soft: -1
        hard: -1
      nofile:
        soft: 4096
        hard: 4096
    ports:
      - "6667:6667"
      - "4400:4400"
      - "7000:7000"
      - "7001:7001"
    networks:
      ircu-test-net:
        ipv4_address: 10.55.0.10

  ircd-leaf1:
    build:
      context: .
      args:
        IRCD_CONF: tests/docker/ircd-leaf1.conf
    container_name: ircu-leaf1
    ports:
      - "6668:6668"
      - "4401:4401"
    networks:
      ircu-test-net:
        ipv4_address: 10.55.0.11
    depends_on:
      - ircd-hub

  ircd-leaf2:
    build:
      context: .
      args:
        IRCD_CONF: tests/docker/ircd-leaf2.conf
    container_name: ircu-leaf2
    ports:
      - "6669:6669"
      - "4402:4402"
    networks:
      ircu-test-net:
        ipv4_address: 10.55.0.12
    depends_on:
      - ircd-hub

  ircd-tls-hub:
    build:
      context: .
      args:
        IRCD_CONF: tests/docker/ircd-tls-hub.conf
        TLS_BACKEND: ${TLS_BACKEND:-openssl}
    container_name: ircu-tls-hub
    ports:
      - "16677:6677"
      - "16697:6697"
      - "16698:6698"
      - "16700:6700"
      - "16701:6701"
      - "14440:4440"
      - "14441:4441"
    networks:
      ircu-test-net:
        ipv4_address: 10.55.0.20

  ircd-tls-leaf:
    build:
      context: .
      args:
        IRCD_CONF: tests/docker/ircd-tls-leaf.conf
        TLS_BACKEND: ${TLS_BACKEND:-openssl}
    container_name: ircu-tls-leaf
    ports:
      - "16678:6678"
      - "16680:6680"
      - "14411:4401"
      - "14412:4402"
    networks:
      ircu-test-net:
        ipv4_address: 10.55.0.21
    depends_on:
      - ircd-tls-hub

networks:
  ircu-test-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.55.0.0/24

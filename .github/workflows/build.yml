name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - 'tests/**'
      - 'doc/**'
      - 'patches/**'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'tests/**'
      - 'doc/**'
      - 'patches/**'
      - '*.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake bison flex

      - name: Generate configure
        run: ./autogen.sh

      - name: Configure
        run: ./configure

      - name: Build
        run: make -j$(nproc)

      - name: Run unit tests
        run: make check
